<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes">
    <meta name="format-detection" content="telephone=no">
    <title>Painel — Flora Macedo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --clay: #1F4D33; --clay-dk: #143524; --sand: #E9EDE1;
            --bone: #F7F6F0; --ink: #1C2A20; --moss: #B8924A;
            --muted: #6F7D6A; --line: #D9DECB; --red: #B5453C;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; max-width: 100%; overflow-x: hidden; }
        body { background: var(--bone); color: var(--ink); font-family:'Inter',sans-serif; min-height:100vh; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overflow-x: hidden; max-width: 100vw; }

        /* LOGIN */
        .login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .login-box { background:white; border-radius:14px; padding:40px 36px; max-width:380px; width:100%; box-shadow:0 12px 40px rgba(0,0,0,0.08); text-align:center; }
        .login-box .login-logo { width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 16px; box-shadow: 0 0 0 1px rgba(184,146,74,0.4), 0 6px 18px rgba(0,0,0,0.12); }
        .login-box h1 { font-family:'Fraunces',serif; font-weight:600; font-size:1.4rem; margin-bottom:6px; }
        .login-box p { color:var(--muted); font-size:0.88rem; margin-bottom:24px; }
        .login-box input { width:100%; padding:13px 16px; border:1.5px solid var(--line); border-radius:8px; font-size:0.95rem; margin-bottom:14px; outline:none; }
        .login-box input:focus { border-color:var(--clay); }
        .login-box button { width:100%; padding:13px; background:var(--clay); color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:0.95rem; }
        .login-box button:hover { background:var(--clay-dk); }
        .login-error { color:var(--red); font-size:0.85rem; margin-top:10px; display:none; }

        /* PAINEL */
        #panel { display:none; }
        header { background:linear-gradient(165deg,var(--clay),var(--clay-dk)); color:white; padding:28px 24px; }
        .header-inner { max-width:760px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
        header h1 { font-family:'Fraunces',serif; font-weight:600; font-size:1.3rem; }
        header p { font-size:0.8rem; opacity:0.85; }
        .btn-logout { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; padding:8px 16px; border-radius:6px; font-size:0.8rem; cursor:pointer; }
        .btn-guia { display:flex; align-items:center; gap:6px; background:rgba(184,146,74,0.25); border:1px solid var(--moss); color:white; padding:8px 16px; border-radius:6px; font-size:0.8rem; cursor:pointer; text-decoration:none; transition:background 0.2s; }
        .btn-guia:hover { background:rgba(184,146,74,0.4); }

        main { max-width:760px; margin:0 auto; padding:32px 24px 80px; }

        .panel-section { background:white; border-radius:12px; padding:28px; margin-bottom:24px; box-shadow:0 2px 12px rgba(0,0,0,0.04); }
        .panel-section h2 { font-family:'Fraunces',serif; font-weight:600; font-size:1.15rem; margin-bottom:18px; display:flex; align-items:center; gap:10px; }
        .panel-section h2 i { color:var(--clay); }

        /* NOVO HORÁRIO */
        .new-slot-form { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
        .form-group { flex:1; min-width:140px; }
        .form-group label { display:block; font-size:0.78rem; color:var(--muted); margin-bottom:6px; font-weight:500; }
        .form-group input { width:100%; padding:11px 14px; border:1.5px solid var(--line); border-radius:8px; font-size:0.9rem; outline:none; }
        .form-group input:focus { border-color:var(--clay); }
        .btn-add { background:var(--moss); color:white; border:none; padding:11px 22px; border-radius:8px; font-weight:600; cursor:pointer; font-size:0.88rem; white-space:nowrap; }
        .btn-add:hover { background:#4a5740; }

        /* LISTA DE SLOTS */
        .slot-row { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border:1px solid var(--line); border-radius:8px; margin-bottom:10px; }
        .slot-row.ocupado { background:var(--sand); }
        .slot-row-info strong { display:block; font-size:0.92rem; }
        .slot-row-info span { font-size:0.8rem; color:var(--muted); }
        .slot-badge { font-size:0.7rem; font-weight:600; padding:3px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.05em; }
        .slot-badge.livre { background:rgba(92,107,79,0.1); color:var(--moss); }
        .slot-badge.ocupado { background:rgba(181,112,74,0.15); color:var(--clay-dk); }
        .btn-remove { background:none; border:none; color:var(--red); cursor:pointer; font-size:1.1rem; padding:4px; }
        .empty-msg { text-align:center; color:var(--muted); padding:24px; font-size:0.88rem; }

        /* AGENDAMENTOS CONFIRMADOS */
        .booking-card { padding:16px; border:1px solid var(--line); border-radius:8px; margin-bottom:10px; }
        .booking-card-top { display:flex; justify-content:space-between; margin-bottom:6px; }
        .booking-card-top strong { font-size:0.95rem; }
        .booking-date { font-size:0.8rem; color:var(--clay-dk); font-weight:600; }
        .booking-card-bottom { display:flex; gap:16px; font-size:0.85rem; color:var(--muted); flex-wrap:wrap; }
        .booking-card-bottom a { color:var(--moss); text-decoration:none; font-weight:600; }
        .btn-cancel-booking { display:flex; align-items:center; gap:6px; background:none; border:1px solid var(--red); color:var(--red); padding:7px 14px; border-radius:6px; font-size:0.78rem; font-weight:600; cursor:pointer; margin-top:12px; transition:all 0.2s; }
        .btn-cancel-booking:hover { background:var(--red); color:white; }

        /* CALENDÁRIO */
        .calendar-card { margin-bottom:20px; }
        .calendar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .calendar-header h3 { font-family:'Fraunces',serif; font-weight:600; font-size:1rem; text-transform:capitalize; color:var(--ink); }
        .calendar-nav-btn { background:var(--sand); border:none; color:var(--clay); width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:0.95rem; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
        .calendar-nav-btn:hover { background:var(--line); }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
        .calendar-weekday { text-align:center; font-size:0.68rem; color:var(--muted); font-weight:600; padding-bottom:6px; text-transform:uppercase; }
        .calendar-day { position:relative; aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:8px; cursor:pointer; font-size:0.85rem; color:var(--ink); transition:background 0.15s; min-width:0; }
        .calendar-day.empty { cursor:default; }
        .calendar-day:not(.empty):hover { background:var(--sand); }
        .calendar-day.hoje { border:1.5px solid var(--clay); font-weight:700; }
        .calendar-day.selecionado { background:var(--clay); color:white; }
        .calendar-day.selecionado:hover { background:var(--clay-dk); }
        .calendar-day .dot { width:5px; height:5px; border-radius:50%; background:var(--moss); margin-top:3px; }
        .calendar-day.selecionado .dot { background:white; }

        .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--moss); color:white; padding:12px 24px; border-radius:8px; font-size:0.88rem; font-weight:600; transition:transform 0.3s; z-index:999; }
        .toast.show { transform:translateX(-50%) translateY(0); }

        @media (max-width:480px) {
            .new-slot-form { flex-direction:column; align-items:stretch; }
            .form-group { min-width:100%; }
            .calendar-day { font-size:0.78rem; }
        }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <img src="./logo_flora.png" alt="Flora Macêdo" class="login-logo">
            <h1>Painel da Flora</h1>
            <p>Digite a senha para gerenciar sua agenda</p>
            <input type="password" id="senha-input" placeholder="Senha" onkeypress="if(event.key==='Enter') verificarSenha()">
            <button onclick="verificarSenha()">Entrar</button>
            <p class="login-error" id="login-error">Senha incorreta. Tente novamente.</p>
        </div>
    </div>

    <!-- PAINEL -->
    <div id="panel">
        <header>
            <div class="header-inner">
                <div>
                    <h1>Olá, Flora 🌿</h1>
                    <p>Gerencie sua agenda de atendimentos</p>
                </div>
                <div style="display:flex; gap:8px;">
                    <a href="./guia-flora.html" class="btn-guia"><i class="bi bi-question-circle"></i> Como usar</a>
                    <button class="btn-logout" onclick="sair()">Sair</button>
                </div>
            </div>
        </header>

        <main>
            <!-- NOVO HORÁRIO -->
            <div class="panel-section">
                <h2><i class="bi bi-calendar-plus"></i> Abrir novo horário</h2>
                <div class="new-slot-form">
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" id="novo-data">
                    </div>
                    <div class="form-group">
                        <label>Horário</label>
                        <input type="time" id="novo-horario">
                    </div>
                    <button class="btn-add" onclick="adicionarSlot()"><i class="bi bi-plus-lg"></i> Adicionar</button>
                </div>
            </div>

            <!-- HORÁRIOS ABERTOS -->
            <div class="panel-section">
                <h2><i class="bi bi-calendar-week"></i> Horários da semana</h2>
                <div id="slots-list">
                    <div class="empty-msg">Carregando...</div>
                </div>
            </div>

            <!-- AGENDAMENTOS CONFIRMADOS -->
            <div class="panel-section">
                <h2><i class="bi bi-check-circle"></i> Clientes agendadas</h2>
                <div class="calendar-card">
                    <div class="calendar-header">
                        <button class="calendar-nav-btn" onclick="mudarMesCalendario(-1)"><i class="bi bi-chevron-left"></i></button>
                        <h3 id="calendar-mes-label"></h3>
                        <button class="calendar-nav-btn" onclick="mudarMesCalendario(1)"><i class="bi bi-chevron-right"></i></button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>
                <div id="bookings-list">
                    <div class="empty-msg">Carregando...</div>
                </div>
            </div>

            <p style="text-align:center; font-size:0.75rem; color:var(--muted); opacity:0.75; margin-top:8px;">
                Desenvolvido por <strong style="color:var(--clay);">65.611.420 FLAVIO GONCALES</strong>
            </p>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ════════════════════════════════════════
        // CONFIGURAÇÃO
        // ════════════════════════════════════════
        const SENHA_PAINEL = 'flora2026';  // ⚠️ Troque essa senha após o primeiro acesso
        const JSONBIN_ID   = '6a31405ff5f4af5e29fae885';
        const JSONBIN_KEY  = '$2a$10$8In7BF0QhgmBKqCO7BgCYeK7GFk7cn/pO3qbcO2wV5dKDzNpbMoMa';
        const JSONBIN_URL  = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;

        let dadosAtuais = null;

        // ── ESTADO DO CALENDÁRIO ──
        let calMes = new Date().getMonth();
        let calAno = new Date().getFullYear();
        let diaSelecionado = null;
        let calendarioInicializado = false;
        const DIAS_SEMANA = ['D','S','T','Q','Q','S','S'];
        const MESES_NOME = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

        function verificarSenha() {
            const input = document.getElementById('senha-input');
            const erro  = document.getElementById('login-error');
            if (input.value === SENHA_PAINEL) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                sessionStorage.setItem('flora-logada', '1');
                carregarDados();
            } else {
                erro.style.display = 'block';
                input.value = '';
            }
        }

        function sair() {
            sessionStorage.removeItem('flora-logada');
            window.location.href = './index.html';
        }

        // Mantém sessão se já logou nessa aba
        if (sessionStorage.getItem('flora-logada') === '1') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
            carregarDados();
        }

        async function carregarDados() {
            try {
                const res = await fetch(JSONBIN_URL + '/latest', { headers: { 'X-Master-Key': JSONBIN_KEY } });
                const json = await res.json();
                dadosAtuais = json.record;
                if (!dadosAtuais.slots) dadosAtuais.slots = [];
                renderizarTudo();
            } catch (e) {
                document.getElementById('slots-list').innerHTML = '<div class="empty-msg">Erro ao carregar. Recarregue a página.</div>';
            }
        }

        async function salvarDados() {
            await fetch(JSONBIN_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
                body: JSON.stringify(dadosAtuais)
            });
        }

        function mostrarToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ── ADICIONAR NOVO HORÁRIO ──
        async function adicionarSlot() {
            const data = document.getElementById('novo-data').value;
            const hora = document.getElementById('novo-horario').value;
            if (!data || !hora) { mostrarToast('Preencha data e horário'); return; }

            const horaFormatada = hora; // já vem como HH:MM
            dadosAtuais.slots.push({ dataISO: data, horario: horaFormatada, ocupado: false });
            await salvarDados();
            renderizarTudo();
            mostrarToast('Horário adicionado!');
            document.getElementById('novo-data').value = '';
            document.getElementById('novo-horario').value = '';
        }

        // ── REMOVER HORÁRIO (livre, sem cliente) ──
        async function removerSlot(dataISO, horario) {
            if (!confirm('Remover este horário da agenda?')) return;
            dadosAtuais.slots = dadosAtuais.slots.filter(s => !(s.dataISO === dataISO && s.horario === horario));
            await salvarDados();
            renderizarTudo();
            mostrarToast('Horário removido');
        }

        // ── CANCELAR AGENDAMENTO (libera o horário de volta para a agenda pública) ──
        async function cancelarAgendamento(dataISO, horario) {
            if (!confirm('Cancelar este agendamento? O horário ficará disponível novamente para outras clientes.')) return;

            dadosAtuais.slots = dadosAtuais.slots.map(s => {
                if (s.dataISO === dataISO && s.horario === horario) {
                    // Remove os dados da cliente e libera o horário
                    return { dataISO: s.dataISO, horario: s.horario, ocupado: false };
                }
                return s;
            });

            await salvarDados();
            renderizarTudo();
            mostrarToast('Agendamento cancelado — horário liberado novamente');
        }

        // ── CALENDÁRIO ──
        function pad(n) { return String(n).padStart(2,'0'); }

        function mudarMesCalendario(delta) {
            calMes += delta;
            if (calMes < 0) { calMes = 11; calAno--; }
            if (calMes > 11) { calMes = 0; calAno++; }
            renderizarCalendario();
        }

        function selecionarDiaCalendario(dataISO) {
            diaSelecionado = dataISO;
            renderizarCalendario();
            renderizarAgendamentosDoDia();
        }

        // Na primeira carga, abre o calendário já no mês do próximo agendamento
        function definirEstadoInicialCalendario() {
            const hojeISO = new Date().toISOString().split('T')[0];
            const diasComAgendamento = [...new Set((dadosAtuais.slots || []).filter(s => s.ocupado).map(s => s.dataISO))].sort();

            let diaEscolhido = null;
            if (diasComAgendamento.includes(hojeISO)) diaEscolhido = hojeISO;
            else diaEscolhido = diasComAgendamento.find(d => d >= hojeISO) || diasComAgendamento[0] || null;

            if (diaEscolhido) {
                const [ano, mes] = diaEscolhido.split('-').map(Number);
                calAno = ano;
                calMes = mes - 1;
            }
            diaSelecionado = diaEscolhido;
        }

        function renderizarCalendario() {
            document.getElementById('calendar-mes-label').textContent = `${MESES_NOME[calMes]} de ${calAno}`;

            const diasComAgendamento = new Set(
                (dadosAtuais.slots || []).filter(s => s.ocupado).map(s => s.dataISO)
            );
            const hojeISO = new Date().toISOString().split('T')[0];
            const primeiroDiaSemana = new Date(calAno, calMes, 1).getDay();
            const totalDias = new Date(calAno, calMes + 1, 0).getDate();

            let html = DIAS_SEMANA.map(d => `<div class="calendar-weekday">${d}</div>`).join('');

            for (let i = 0; i < primeiroDiaSemana; i++) {
                html += `<div class="calendar-day empty"></div>`;
            }

            for (let dia = 1; dia <= totalDias; dia++) {
                const dataISO = `${calAno}-${pad(calMes+1)}-${pad(dia)}`;
                const temAgendamento = diasComAgendamento.has(dataISO);
                const classes = ['calendar-day'];
                if (dataISO === hojeISO) classes.push('hoje');
                if (dataISO === diaSelecionado) classes.push('selecionado');
                html += `
                    <div class="${classes.join(' ')}" onclick="selecionarDiaCalendario('${dataISO}')">
                        ${dia}
                        ${temAgendamento ? '<div class="dot"></div>' : ''}
                    </div>`;
            }

            document.getElementById('calendar-grid').innerHTML = html;
        }

        function renderizarAgendamentosDoDia() {
            const bookingsList = document.getElementById('bookings-list');

            if (!diaSelecionado) {
                bookingsList.innerHTML = '<div class="empty-msg">Selecione um dia marcado no calendário para ver os agendamentos.</div>';
                return;
            }

            const bookingsDoDia = (dadosAtuais.slots || [])
                .filter(s => s.ocupado && s.dataISO === diaSelecionado)
                .sort((a,b) => a.horario.localeCompare(b.horario));

            if (bookingsDoDia.length === 0) {
                const dataFmt = new Date(diaSelecionado+'T00:00:00').toLocaleDateString('pt-BR', { day:'2-digit', month:'long' });
                bookingsList.innerHTML = `<div class="empty-msg">Nenhuma cliente agendada em ${dataFmt}.</div>`;
                return;
            }

            bookingsList.innerHTML = bookingsDoDia.map(b => {
                const telLimpo = (b.telefone || '').replace(/\D/g,'');
                return `
                    <div class="booking-card">
                        <div class="booking-card-top">
                            <strong>${b.cliente || 'Sem nome'}</strong>
                            <span class="booking-date">${b.horario}</span>
                        </div>
                        <div class="booking-card-bottom">
                            <span><i class="bi bi-stars"></i> ${b.servico || '—'}</span>
                            ${b.modalidade ? `<span><i class="bi ${b.modalidade === 'Presencial' ? 'bi-geo-alt' : 'bi-laptop'}"></i> ${b.modalidade}</span>` : ''}
                            ${b.nascimento ? `<span><i class="bi bi-cake2"></i> ${new Date(b.nascimento+'T00:00:00').toLocaleDateString('pt-BR')}</span>` : ''}
                            ${telLimpo ? `<a href="https://wa.me/55${telLimpo}" target="_blank"><i class="bi bi-whatsapp"></i> ${b.telefone}</a>` : ''}
                        </div>
                        <button class="btn-cancel-booking" onclick="cancelarAgendamento('${b.dataISO}','${b.horario}')">
                            <i class="bi bi-x-circle"></i> Cancelar agendamento
                        </button>
                    </div>`;
            }).join('');
        }

        // ── RENDERIZA TUDO ──
        function renderizarTudo() {
            const slots = [...dadosAtuais.slots].sort((a,b) => new Date(a.dataISO+'T'+a.horario) - new Date(b.dataISO+'T'+b.horario));

            // Lista de horários (livres + ocupados)
            const slotsList = document.getElementById('slots-list');
            if (slots.length === 0) {
                slotsList.innerHTML = '<div class="empty-msg">Nenhum horário cadastrado ainda.</div>';
            } else {
                slotsList.innerHTML = slots.map(s => {
                    const dataFmt = new Date(s.dataISO+'T00:00:00').toLocaleDateString('pt-BR', { day:'2-digit', month:'short', weekday:'short' });
                    return `
                        <div class="slot-row ${s.ocupado ? 'ocupado' : ''}">
                            <div class="slot-row-info">
                                <strong>${dataFmt} às ${s.horario}</strong>
                                <span class="slot-badge ${s.ocupado ? 'ocupado' : 'livre'}">${s.ocupado ? 'Ocupado' : 'Livre'}</span>
                            </div>
                            ${!s.ocupado ? `<button class="btn-remove" onclick="removerSlot('${s.dataISO}','${s.horario}')"><i class="bi bi-trash"></i></button>` : ''}
                        </div>`;
                }).join('');
            }

            // Calendário + agendamentos do dia selecionado
            if (!calendarioInicializado) {
                definirEstadoInicialCalendario();
                calendarioInicializado = true;
            }
            renderizarCalendario();
            renderizarAgendamentosDoDia();
        }
    </script>
</body>
</html>
